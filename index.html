<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オンギャーマネジメント</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');

  :root {
    --cream: #FFF8F0;
    --peach: #FFB347;
    --pink: #FF8FAB;
    --baby-blue: #AED6F1;
    --soft-green: #A8D8A8;
    --red: #FF4757;
    --dark: #3D2B1F;
    --wall: #C89B7B;
    --path: #FFF3E8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(circle at 20% 20%, #FFE0EC 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, #E0F0FF 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, #FFF8F0 0%, transparent 70%);
    z-index: 0;
  }

  .floating-emoji {
    position: fixed;
    font-size: 2rem;
    opacity: 0.12;
    animation: floatAround 8s ease-in-out infinite;
    z-index: 0;
    pointer-events: none;
  }

  @keyframes floatAround {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    33% { transform: translateY(-20px) rotate(10deg); }
    66% { transform: translateY(10px) rotate(-5deg); }
  }

  #screen-countdown {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(255,248,240,0.85);
    backdrop-filter: blur(4px);
  }

  #screen-countdown.active { display: flex !important; }

  .countdown-num {
    font-family: 'Kaisei Decol', serif;
    font-size: clamp(6rem, 30vw, 10rem);
    font-weight: 700;
    color: var(--dark);
    text-shadow: 4px 4px 0 var(--peach);
    animation: countPop 0.9s ease-out forwards;
  }

  .countdown-num.go {
    color: var(--pink);
    text-shadow: 4px 4px 0 #d4607a;
  }

  @keyframes countPop {
    0%   { transform: scale(1.8); opacity: 0; }
    30%  { transform: scale(1);   opacity: 1; }
    80%  { transform: scale(1);   opacity: 1; }
    100% { transform: scale(0.6); opacity: 0; }
  }

  #screen-title, #screen-game, #screen-gameover, #screen-clear {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 500px;
    padding: 20px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .active { display: flex !important; }

  /* TITLE */
  .title-main {
    font-family: 'Kaisei Decol', serif;
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: 700;
    color: var(--dark);
    text-align: center;
    line-height: 1.2;
    text-shadow: 3px 3px 0 var(--peach);
  }

  .title-sub {
    font-size: 0.9rem;
    color: #888;
    text-align: center;
    line-height: 1.6;
  }

  .baby-display {
    font-size: 5rem;
    animation: babyCry 0.5s ease-in-out infinite alternate;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
  }

  @keyframes babyCry {
    from { transform: rotate(-5deg) scale(1); }
    to { transform: rotate(5deg) scale(1.05); }
  }

  .btn-start {
    background: linear-gradient(135deg, var(--pink), var(--peach));
    color: white;
    border: none;
    padding: 18px 48px;
    font-size: 1.3rem;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-weight: 800;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255,143,171,0.5), 0 3px 0 #d4607a;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,143,171,0.6), 0 3px 0 #d4607a; }
  .btn-start:active { transform: translateY(2px); box-shadow: 0 2px 8px rgba(255,143,171,0.4), 0 1px 0 #d4607a; }

  /* GAME SCREEN */
  .hud {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .stage-badge {
    background: var(--dark);
    color: var(--peach);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.1em;
  }

  .timer-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .timer-bar-bg {
    width: 100%;
    height: 14px;
    background: #E8D5C4;
    border-radius: 7px;
    overflow: hidden;
  }

  .timer-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--soft-green), var(--peach));
    border-radius: 7px;
    transition: width 0.1s linear, background 0.3s;
  }

  .timer-bar.danger { background: linear-gradient(90deg, var(--red), #FF8C00); }

  .timer-num {
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--dark);
    min-width: 40px;
    text-align: center;
  }

  .timer-num.danger { color: var(--red); animation: pulse 0.3s ease-in-out infinite alternate; }

  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.15); }
  }

  .characters {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    width: 100%;
    padding: 0 8px;
  }

  .char {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .char-emoji { font-size: 2.5rem; }
  .char-label { font-size: 0.7rem; color: #999; font-weight: 700; letter-spacing: 0.05em; }

  .baby-char .char-emoji {
    animation: babyCrySmall 0.4s ease-in-out infinite alternate;
  }

  @keyframes babyCrySmall {
    from { transform: rotate(-3deg); }
    to { transform: rotate(3deg); }
  }

  .maze-container {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(61,43,31,0.15), 0 0 0 3px var(--wall);
  }

  canvas {
    display: block;
    cursor: crosshair;
  }

  .maze-hint {
    font-size: 0.75rem;
    color: #AAA;
    text-align: center;
  }

  /* GAME OVER */
  .result-emoji {
    font-size: 6rem;
    animation: bigBounce 0.6s ease-out;
  }

  @keyframes bigBounce {
    0% { transform: scale(0) rotate(-20deg); }
    70% { transform: scale(1.2) rotate(5deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  .result-title {
    font-family: 'Kaisei Decol', serif;
    font-size: 2.5rem;
    font-weight: 700;
    text-align: center;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.1);
  }

  .result-title.fail { color: var(--red); }
  .result-title.success { color: var(--soft-green); text-shadow: 3px 3px 0 #5a9a5a; }

  .result-sub {
    font-size: 1rem;
    color: #888;
    text-align: center;
    line-height: 1.6;
  }

  .result-stats {
    background: white;
    border-radius: 16px;
    padding: 16px 24px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    width: 100%;
  }

  .stat-num {
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--peach);
  }

  .stat-label { font-size: 0.8rem; color: #aaa; }

  .cry-wave {
    font-size: 1.5rem;
    letter-spacing: 4px;
    animation: waveCry 1s ease-in-out infinite;
  }

  @keyframes waveCry {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<!-- floating bg -->
<div class="floating-emoji" style="top:5%;left:8%;animation-delay:0s">🍼</div>
<div class="floating-emoji" style="top:15%;right:10%;animation-delay:1s">⭐</div>
<div class="floating-emoji" style="top:70%;left:5%;animation-delay:2s">🌙</div>
<div class="floating-emoji" style="top:80%;right:8%;animation-delay:3s">🍼</div>
<div class="floating-emoji" style="top:40%;left:2%;animation-delay:4s">💫</div>
<div class="floating-emoji" style="top:50%;right:3%;animation-delay:1.5s">🌟</div>

<!-- COUNTDOWN OVERLAY -->
<div id="screen-countdown">
  <div class="countdown-num" id="countdown-text">3</div>
</div>

<!-- TITLE SCREEN -->
<div id="screen-title" class="active">
  <div class="baby-display">👶</div>
  <div class="title-main">オンギャー<br>マネジメント</div>
  <div class="title-sub">
    赤ちゃんが泣いてる！<br>
    <strong>6秒以内</strong>に迷路を抜けて<br>
    ご飯を届けるんだ！
  </div>
  <button class="btn-start" onclick="startGame()">スタート！</button>
</div>

<!-- GAME SCREEN -->
<div id="screen-game">
  <div class="hud">
    <div class="stage-badge">STAGE <span id="stage-num">1</span></div>
    <div class="timer-wrap">
      <div class="timer-bar-bg">
        <div class="timer-bar" id="timer-bar"></div>
      </div>
    </div>
    <div class="timer-num" id="timer-num">6.0</div>
  </div>

  <div class="characters">
    <div class="char">
      <div class="char-emoji">🍼</div>
      <div class="char-label">ゴール</div>
    </div>
    <div class="char baby-char" id="baby-crying">
      <div class="char-emoji">😭</div>
      <div class="char-label">オンギャー！</div>
    </div>
  </div>

  <div class="maze-container">
    <canvas id="maze-canvas" width="360" height="360"></canvas>
  </div>
  <div class="maze-hint">クリックorタップで進む方向を選ぼう</div>
</div>

<!-- GAME OVER SCREEN -->
<div id="screen-gameover">
  <div class="result-emoji">😭</div>
  <div class="result-title fail">オンギャー！！</div>
  <div class="cry-wave">😭😭😭</div>
  <div class="result-sub">間に合わなかった…<br>赤ちゃんがさらに泣いてる</div>
  <div class="result-stats">
    <div class="stat-num" id="go-stage">0</div>
    <div class="stat-label">ステージまで到達</div>
  </div>
  <button class="btn-start" style="background:linear-gradient(135deg,#FF6B6B,#FF8E53)" onclick="startGame()">もう一度！</button>
</div>

<!-- CLEAR SCREEN (all stages) -->
<div id="screen-clear">
  <div class="result-emoji">🎉</div>
  <div class="result-title success">すごい！！</div>
  <div class="result-sub">赤ちゃんが泣き止んだ！<br>あなたはオンギャーマネジメントの達人だ！</div>
  <div style="font-size:3rem">👶✨🍼</div>
  <button class="btn-start" onclick="startGame()">もう一度！</button>
</div>

<script>
// ===== MAZE GENERATOR =====
const CELL = 40;
const canvas = document.getElementById('maze-canvas');
const ctx = canvas.getContext('2d');

let stage = 1;
let timeLeft = 6.0;
let timerInterval = null;
let maze = [];
let playerPos = { x: 0, y: 0 };
let goalPos = { x: 0, y: 0 };
let gridSize = 5;
let gameActive = false;

const WALL_COLOR = '#C89B7B';
const PATH_COLOR = '#FFF8F0';
const PLAYER_COLOR = '#FF8FAB';
const GOAL_COLOR = '#A8D8A8';

function getMazeSize(stg) {
  if (stg <= 2) return 5;
  if (stg <= 4) return 7;
  if (stg <= 6) return 9;
  return 11;
}

function getTimeLimit(stg) {
  if (stg === 1) return 6.0;
  if (stg === 2) return 6.0;
  if (stg <= 4) return 5.5;
  if (stg <= 6) return 5.0;
  return 4.5;
}

// Wilson's algorithm for perfect maze
function generateMaze(size) {
  const cells = Array.from({length: size}, () => Array(size).fill(0));
  // walls: right=1, down=2
  const walls = Array.from({length: size}, () => Array.from({length: size}, () => ({right: true, down: true})));
  const inMaze = Array.from({length: size}, () => Array(size).fill(false));

  inMaze[0][0] = true;
  let remaining = size * size - 1;

  function neighbors(r, c) {
    const n = [];
    if (r > 0) n.push([r-1, c]);
    if (r < size-1) n.push([r+1, c]);
    if (c > 0) n.push([r, c-1]);
    if (c < size-1) n.push([r, c+1]);
    return n;
  }

  while (remaining > 0) {
    // find unvisited cell
    let sr, sc;
    do {
      sr = Math.floor(Math.random() * size);
      sc = Math.floor(Math.random() * size);
    } while (inMaze[sr][sc]);

    // random walk
    const path = [[sr, sc]];
    const visited = {[`${sr},${sc}`]: 0};

    while (!inMaze[path[path.length-1][0]][path[path.length-1][1]]) {
      const cur = path[path.length-1];
      const ns = neighbors(cur[0], cur[1]);
      const next = ns[Math.floor(Math.random() * ns.length)];
      const key = `${next[0]},${next[1]}`;
      if (visited[key] !== undefined) {
        // loop erase
        const idx = visited[key];
        path.splice(idx + 1);
        const keysToDelete = Object.keys(visited).filter(k => visited[k] > idx);
        keysToDelete.forEach(k => delete visited[k]);
      } else {
        visited[key] = path.length;
        path.push(next);
      }
    }

    // carve path
    for (let i = 0; i < path.length - 1; i++) {
      const [r1, c1] = path[i];
      const [r2, c2] = path[i+1];
      inMaze[r1][c1] = true;
      if (r2 === r1 + 1) walls[r1][c1].down = false;
      else if (r2 === r1 - 1) walls[r2][c2].down = false;
      else if (c2 === c1 + 1) walls[r1][c1].right = false;
      else if (c2 === c1 - 1) walls[r2][c2].right = false;
      remaining--;
    }
  }
  return walls;
}

function canMove(r, c, dr, dc, walls, size) {
  const nr = r + dr, nc = c + dc;
  if (nr < 0 || nr >= size || nc < 0 || nc >= size) return false;
  if (dr === 1) return !walls[r][c].down;
  if (dr === -1) return !walls[nr][nc].down;
  if (dc === 1) return !walls[r][c].right;
  if (dc === -1) return !walls[nr][nc].right;
  return false;
}

function drawMaze() {
  const size = gridSize;
  const canvasSize = size * CELL;
  canvas.width = canvasSize;
  canvas.height = canvasSize;

  ctx.fillStyle = PATH_COLOR;
  ctx.fillRect(0, 0, canvasSize, canvasSize);

  // draw walls
  ctx.strokeStyle = WALL_COLOR;
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';

  // outer border
  ctx.strokeRect(1.5, 1.5, canvasSize - 3, canvasSize - 3);

  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const x = c * CELL, y = r * CELL;
      if (maze[r][c].right && c < size - 1) {
        ctx.beginPath();
        ctx.moveTo(x + CELL, y);
        ctx.lineTo(x + CELL, y + CELL);
        ctx.stroke();
      }
      if (maze[r][c].down && r < size - 1) {
        ctx.beginPath();
        ctx.moveTo(x, y + CELL);
        ctx.lineTo(x + CELL, y + CELL);
        ctx.stroke();
      }
    }
  }

  // goal
  const gx = goalPos.x * CELL + CELL/2;
  const gy = goalPos.y * CELL + CELL/2;
  ctx.fillStyle = GOAL_COLOR;
  ctx.beginPath();
  ctx.arc(gx, gy, CELL/2 - 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.font = `${CELL * 0.6}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🍼', gx, gy);

  // player
  const px = playerPos.x * CELL + CELL/2;
  const py = playerPos.y * CELL + CELL/2;
  ctx.fillStyle = PLAYER_COLOR;
  ctx.beginPath();
  ctx.arc(px, py, CELL/2 - 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.font = `${CELL * 0.5}px serif`;
  ctx.fillText('🍚', px, py);
}

function tryMove(dr, dc) {
  if (!gameActive) return;
  if (canMove(playerPos.y, playerPos.x, dr, dc, maze, gridSize)) {
    playerPos.x += dc;
    playerPos.y += dr;
    drawMaze();
    if (playerPos.x === goalPos.x && playerPos.y === goalPos.y) {
      stageClear();
    }
  }
}

// Click/touch to move
canvas.addEventListener('click', (e) => {
  if (!gameActive) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  const px = playerPos.x * CELL + CELL/2;
  const py = playerPos.y * CELL + CELL/2;
  const dx = mx - px, dy = my - py;

  if (Math.abs(dx) > Math.abs(dy)) {
    tryMove(0, dx > 0 ? 1 : -1);
  } else {
    tryMove(dy > 0 ? 1 : -1, 0);
  }
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (!gameActive) return;
  if (e.key === 'ArrowUp' || e.key === 'w') { e.preventDefault(); tryMove(-1, 0); }
  if (e.key === 'ArrowDown' || e.key === 's') { e.preventDefault(); tryMove(1, 0); }
  if (e.key === 'ArrowLeft' || e.key === 'a') { e.preventDefault(); tryMove(0, -1); }
  if (e.key === 'ArrowRight' || e.key === 'd') { e.preventDefault(); tryMove(0, 1); }
});

// Touch swipe
let touchStart = null;
canvas.addEventListener('touchstart', (e) => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  if (!touchStart || !gameActive) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) {
    // tap - treat like click at touch position
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.changedTouches[0].clientX - rect.left) * scaleX;
    const my = (e.changedTouches[0].clientY - rect.top) * scaleY;
    const px = playerPos.x * CELL + CELL/2;
    const py = playerPos.y * CELL + CELL/2;
    const ddx = mx - px, ddy = my - py;
    if (Math.abs(ddx) > Math.abs(ddy)) tryMove(0, ddx > 0 ? 1 : -1);
    else tryMove(ddy > 0 ? 1 : -1, 0);
  } else if (Math.abs(dx) > Math.abs(dy)) {
    tryMove(0, dx > 0 ? 1 : -1);
  } else {
    tryMove(dy > 0 ? 1 : -1, 0);
  }
  touchStart = null;
  e.preventDefault();
}, { passive: false });

function showScreen(id) {
  document.querySelectorAll('[id^="screen-"]').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startStage() {
  gridSize = getMazeSize(stage);
  timeLeft = getTimeLimit(stage);

  // Resize canvas for mobile
  const maxSize = Math.min(360, window.innerWidth - 60);
  const cellSize = Math.floor(maxSize / gridSize);
  canvas.width = gridSize * cellSize;
  canvas.height = gridSize * cellSize;
  // Override CELL constant via CSS scale
  canvas.style.width = Math.min(360, window.innerWidth - 60) + 'px';
  canvas.style.height = Math.min(360, window.innerWidth - 60) + 'px';

  maze = generateMaze(gridSize);
  playerPos = { x: 0, y: 0 };
  goalPos = { x: gridSize - 1, y: gridSize - 1 };

  document.getElementById('stage-num').textContent = stage;
  updateTimer();
  drawMaze();

  gameActive = true;
  showScreen('screen-game');

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft -= 0.1;
    if (timeLeft <= 0) {
      timeLeft = 0;
      updateTimer();
      gameOver();
    } else {
      updateTimer();
    }
  }, 100);
}

function updateTimer() {
  const pct = (timeLeft / getTimeLimit(stage)) * 100;
  const bar = document.getElementById('timer-bar');
  const num = document.getElementById('timer-num');
  bar.style.width = pct + '%';
  num.textContent = Math.max(0, timeLeft).toFixed(1);
  const isDanger = timeLeft <= 2;
  bar.classList.toggle('danger', isDanger);
  num.classList.toggle('danger', isDanger);
}

function stageClear() {
  clearInterval(timerInterval);
  gameActive = false;

  const maxStage = 7;
  if (stage >= maxStage) {
    showScreen('screen-clear');
  } else {
    stage++;
    // brief flash
    document.getElementById('baby-crying').querySelector('.char-emoji').textContent = '😊';
    document.getElementById('baby-crying').querySelector('.char-label').textContent = 'やったー！';
    setTimeout(() => {
      document.getElementById('baby-crying').querySelector('.char-emoji').textContent = '😭';
      document.getElementById('baby-crying').querySelector('.char-label').textContent = 'オンギャー！';
      startStage();
    }, 800);
  }
}

function gameOver() {
  clearInterval(timerInterval);
  gameActive = false;
  document.getElementById('go-stage').textContent = `STAGE ${stage}`;
  showScreen('screen-gameover');
}

function startGame() {
  stage = 1;
  showCountdown(() => startStage());
}

function showCountdown(callback) {
  const overlay = document.getElementById('screen-countdown');
  const text = document.getElementById('countdown-text');
  const steps = ['3', '2', '1', 'GO!'];
  let i = 0;

  overlay.classList.add('active');

  function tick() {
    text.className = 'countdown-num' + (steps[i] === 'GO!' ? ' go' : '');
    text.textContent = steps[i];
    // restart animation
    text.style.animation = 'none';
    text.offsetHeight;
    text.style.animation = '';

    i++;
    if (i < steps.length) {
      setTimeout(tick, 900);
    } else {
      setTimeout(() => {
        overlay.classList.remove('active');
        callback();
      }, 900);
    }
  }

  tick();
}
</script>
</body>
</html>
